name: Sync Metabase Data

on:
  schedule:
    - cron: '0 * * * *'   # Every hour
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch data from Metabase
        env:
          MB_URL: ${{ secrets.MB_URL }}
          MB_EMAIL: ${{ secrets.MB_EMAIL }}
          MB_PASSWORD: ${{ secrets.MB_PASSWORD }}
          MB_QID: ${{ secrets.MB_QID }}
        run: node fetch-data.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.csv data/last-sync.txt
          git diff --staged --quiet || git commit -m "chore: sync data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
